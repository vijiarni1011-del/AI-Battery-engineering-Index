  </div>
  <div class="top-right">
    <!-- Auto-save indicator -->
    <div id="_save_badge" style="font-size:9px;font-family:var(--mono);color:var(--text3);padding:4px 8px;border-radius:5px;background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.15);transition:opacity .3s;opacity:0.5;white-space:nowrap">Not saved yet</div>
    <!-- Reset button -->
    <button id="global_submit_btn" onclick="submitAndLock()" title="Save & lock all project data"
      style="padding:5px 12px;background:rgba(0,212,170,.12);border:1px solid rgba(0,212,170,.3);color:var(--teal);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s"
      onmouseover="this.style.background='rgba(0,212,170,.22)'" onmouseout="this.style.background='rgba(0,212,170,.12)'">
      💾 Save & Lock
    </button>
    <button onclick="resetAndUnlock()" title="Reset all inputs to factory defaults"
      style="padding:5px 10px;background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);color:var(--r);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:all .15s"
      onmouseover="this.style.background='rgba(255,77,109,.18)'" onmouseout="this.style.background='rgba(255,77,109,.08)'">

    <!-- User Auth Area -->
    <div id="hdr_user_area" style="display:flex;align-items:center;gap:8px;padding:0 8px;border-left:1px solid var(--border)">
      <span id="hdr_role" style="font-size:9px;padding:2px 7px;background:rgba(59,130,246,.12);color:#60a5fa;border-radius:3px;font-weight:700;white-space:nowrap"></span>
      <span id="hdr_user" style="font-size:11px;color:var(--text2);font-weight:600;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button id="hdr_admin_btn" onclick="showAdminPanel()" style="display:none;align-items:center;gap:4px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);border-radius:5px;color:#f59e0b;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap">⚙ Admin</button>
      <button onclick="AUTH.logout();showLoginModal()" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:5px;color:#ef4444;padding:4px 9px;font-size:10px;cursor:pointer;font-weight:600;white-space:nowrap">↩ Sign Out</button>

<div id="eng-panel">

<!-- Engineering sub-nav (inner tabs) -->
<script>

  <button class="nb active" onclick="showSec('targets',this)"><span class="ni">🎯</span> Project Targets</button>

<!-- ═══ ALL ENGINEERING SECTIONS (from battery-engineering-platform.html) ═══ -->
<div class="sec active" id="targets">

<div class="sh">
  <h2>🎯 Project Requirements &amp; Targets <span class="ok-tag" style="margin-left:10px;font-size:10px">MASTER INPUT — feeds all modules</span></h2>
  <p>Define all targets here first. Results across all tabs update based on these values. Colour indicators show pass / warn / fail against targets.</p>
</div>

<div class="ico-banner">🔗 All modules read from this sheet. Fill these targets before using other tabs — calculations auto-update.</div>

<!-- ══ SECTION 1: Project Setup ══ -->
<div class="div-label" style="margin-bottom:12px">① Project Setup</div>
<div class="g2" style="margin-bottom:20px">

  <!-- Project Info -->
  <div class="card">
    <div class="ch3">📁 Project Information</div>
    <div class="g2">
      <div class="field"><label>Project Code / Name</label><input type="text" id="t_proj" value="PRJ-001" oninput="propagate()"></div>
      <div class="field"><label>SOP / Milestone Date</label><input type="text" id="t_sop" value="2027-Q4" oninput="propagate()"></div>
      <div class="field"><label>Target Markets</label><input type="text" id="t_markets" value="EU, US, JP" oninput="propagate()"></div>
      <div class="field"><label>Functional Safety Target</label>
        <select id="t_fusa" onchange="toggleFusaCustom();propagate()">
          <option value="none">None / Not Required</option>
          <option value="pld">PLd (ISO 13849) — Off-highway</option>
          <option value="ple">PLe (ISO 13849)</option>
          <option value="asilb">ASIL B (ISO 26262)</option>
          <option value="asilc">ASIL C (ISO 26262)</option>
          <option value="asild">ASIL D (ISO 26262)</option>
          <option value="sil2">SIL 2 (IEC 62061)</option>
        </select>
      </div>
    </div>
    <div id="fusa_custom_div" style="display:none;margin-top:8px">
      <div class="field"><label>Custom FuSa requirement</label><input type="text" id="t_fusa_custom" placeholder="e.g. IEC 61508 SIL 3" oninput="propagate()"></div>
    </div>
  </div>

  <!-- Application Type -->
  <div class="card">
    <div class="ch3">🚗 Vehicle / Application Type <span class="lsource" style="float:right">MASTER</span></div>
    <div id="app_cards" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px">
      <div class="app-card" data-val="Excavator" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🏗️</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Excavator</div>
        <div style="font-size:9px;color:var(--m)">Off-highway</div>
      </div>
      <div class="app-card" data-val="WheelLoader" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🚜</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Wheel Loader</div>
        <div style="font-size:9px;color:var(--m)">Construction</div>
      </div>
      <div class="app-card" data-val="AgTractor" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🌾</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Ag Tractor</div>
        <div style="font-size:9px;color:var(--m)">Farming</div>
      </div>
      <div class="app-card" data-val="2W" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🏍️</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">2-Wheeler</div>
        <div style="font-size:9px;color:var(--m)">E-bike / Moto</div>
      </div>
      <div class="app-card" data-val="4W" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🚗</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">4-Wheeler</div>
        <div style="font-size:9px;color:var(--m)">Passenger EV</div>
      </div>
      <div class="app-card" data-val="Bus" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🚌</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Bus</div>
        <div style="font-size:9px;color:var(--m)">Transit</div>
      </div>
      <div class="app-card" data-val="Truck" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🚛</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Truck / HCV</div>
        <div style="font-size:9px;color:var(--m)">Commercial</div>
      </div>
      <div class="app-card" data-val="Industrial" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🏭</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Industrial / AGV</div>
        <div style="font-size:9px;color:var(--m)">Forklift / Crane</div>
      </div>
      <div class="app-card" data-val="Other" onclick="selectApp(this)" style="cursor:pointer;border:1.5px solid var(--border);border-radius:8px;padding:10px;transition:all .15s;background:var(--bg3);position:relative;text-align:center">
        <div style="font-size:20px;margin-bottom:4px">⚙️</div>
        <div style="font-size:11px;font-weight:700;color:var(--t)">Other / Custom</div>
        <div style="font-size:9px;color:var(--m)">Marine / Rail</div>
      </div>
      <input type="hidden" id="t_app" value="Industrial">
    </div>
    <div class="field" style="margin-top:10px"><input type="text" id="t_app_custom" placeholder="Describe custom application (if Other selected)…" style="font-size:11px" oninput="propagate()"></div>
  </div>
</div>

<!-- ══ SECTION 2: Performance Targets ══ -->
<div class="div-label" style="margin-bottom:12px">② Performance Targets</div>
<div class="g3" style="margin-bottom:20px">

  <div class="card">
    <div class="ch3">⚡ Energy &amp; Capacity</div>
    <div class="field"><label>Min Installed Energy (kWh) <span class="lsource">TARGET</span></label><input type="number" id="t_emin" value="40" oninput="propagate()"><div class="hint">Minimum gross pack energy required</div></div>
    <div class="field"><label>Max Installed Energy (kWh)</label><input type="number" id="t_emax" value="60" oninput="propagate()"></div>
    <div class="field"><label>Min Usable Energy (kWh)</label><input type="number" id="t_eu_min" value="35" oninput="propagate()"></div>
    <div class="field"><label>Autonomy Target (hours)</label><input type="number" id="t_auto" value="4" step="0.5" oninput="propagate()"></div>
    <div class="field"><label>Cost Target (€/kWh)</label><input type="number" id="t_cost" value="130" oninput="propagate()"></div>
    <div class="field"><label>IP Rating Requirement</label>
      <select id="t_ip" onchange="propagate()">
        <option value="ip65">IP65</option><option value="ip67" selected>IP67</option>
        <option value="ip68">IP68</option><option value="ip6k9k">IP68 + IP6K9K</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="ch3">🔌 Electrical Performance</div>
    <div class="field"><label>Voltage Architecture</label>
      <select id="t_varch" onchange="propagate()">
        <option value="48">48V LV</option><option value="96">96V</option>
        <option value="400" selected>400V HV</option><option value="800">800V HV</option>
      </select>
    </div>
    <div class="field"><label>System V_min (Vdc)</label><input type="number" id="t_vmin_sys" value="250" oninput="propagate()"></div>
    <div class="field"><label>System V_max (Vdc)</label><input type="number" id="t_vmax_sys" value="500" oninput="propagate()"></div>
    <div class="field"><label>Peak Discharge Power (kW)</label><input type="number" id="t_ppeak" value="80" oninput="propagate()"></div>
    <div class="field"><label>Cont. Discharge Power (kW)</label><input type="number" id="t_pcont" value="50" oninput="propagate()"></div>
    <div class="field"><label>Peak Discharge Duration (s)</label><input type="number" id="t_tpeak" value="30" oninput="propagate()"></div>
    <div class="field"><label>Peak C-rate allowed</label><input type="number" id="t_cpeak" value="2.0" step="0.1" oninput="propagate()"></div>
  </div>

  <div class="card">
    <div class="ch3">🌡️ Thermal &amp; Environment</div>
    <div class="field"><label>Min Operating Temp (°C)</label><input type="number" id="t_top_lo" value="-20" oninput="propagate()"></div>
    <div class="field"><label>Max Operating Temp (°C)</label><input type="number" id="t_top_hi" value="45" oninput="propagate()"></div>
    <div class="field"><label>Max Cell Temp (°C)</label><input type="number" id="t_tcell_max" value="55" oninput="propagate()"></div>
    <div class="field"><label>Max Cell Temp Gradient (°C)</label><input type="number" id="t_tgrad" value="5" oninput="propagate()"></div>
    <div class="field"><label>Altitude (MASL)</label><input type="number" id="t_alt" value="3000" oninput="propagate()"></div>
    <div class="field"><label>Cooling Type</label>
      <select id="t_cooling" onchange="propagate()">
        <option value="liquid">Liquid cooling</option>
        <option value="air">Air cooling</option>
        <option value="immersion">Immersion</option>
      </select>
    </div>
    <div class="field"><label>Min Volumetric Energy Density (Wh/L)</label><input type="number" id="t_ged" value="200" oninput="propagate()"></div>
  </div>
</div>

<!-- ══ SECTION 3: Charging & Lifetime ══ -->
<div class="div-label" style="margin-bottom:12px">③ Charging &amp; Lifetime</div>
<div class="g2" style="margin-bottom:20px">

  <div class="card">
    <div class="ch3">🔋 Charging Targets</div>
    <div class="g2">
      <div class="field"><label>AC Charge Power (kW)</label><input type="number" id="t_pac" value="22" oninput="propagate()"></div>
      <div class="field"><label>DC Fast Charge Power (kW)</label><input type="number" id="t_pdc" value="60" oninput="propagate()"></div>
      <div class="field"><label>Target Charge C-rate (cont.)</label><input type="number" id="t_cchg" value="0.5" step="0.1" oninput="propagate()"></div>
      <div class="field"><label>Min Ambient for Charging (°C)</label><input type="number" id="t_tchg_lo" value="-15" oninput="propagate()"></div>
      <div class="field"><label>Max Ambient for Charging (°C)</label><input type="number" id="t_tchg_hi" value="45" oninput="propagate()"></div>
      <div class="field"><label>Max Cont. Charge Current (A)</label><input type="number" id="t_imax_chg" value="120" step="1" oninput="propagate()"><div class="hint">Cell datasheet limit — flows to Charging tab automatically</div></div>
    </div>
  </div>

  <div class="card">
    <div class="ch3">📈 Lifetime &amp; Reliability</div>
    <div class="g2">
      <div class="field"><label>SoC Window / DoD (0–1)</label><input type="number" id="t_dod" value="1.0" step="0.05" min="0.1" max="1.0" oninput="propagate()"><div class="hint">1.0 = full 0–100% SoC · 0.8 = 10–90% window · flows to Energy tab</div></div>
      <div class="field"><label>Min Cycle Life (cycles)</label><input type="number" id="t_cycles" value="3000" oninput="propagate()"></div>
      <div class="field"><label>EoL SoH (%)</label><input type="number" id="t_soh_eol" value="80" oninput="propagate()"></div>
      <div class="field"><label>Calendar Life (years)</label><input type="number" id="t_years" value="10" oninput="propagate()"></div>
      <div class="field"><label>Year 5 SoH Target (%)</label><input type="number" id="t_soh5" value="90" oninput="propagate()"></div>
      <div class="field"><label>Year 10 SoH Target (%)</label><input type="number" id="t_soh10" value="80" oninput="propagate()"></div>
      <div class="field"><label>Operating Days / Year</label><input type="number" id="t_days_yr" value="200" oninput="propagate()"></div>
      <div class="field"><label>Full Cycles / Day</label><input type="number" id="t_cycles_day" value="1.0" step="0.5" oninput="propagate()"></div>
    </div>
  </div>
</div>

<!-- ══ SECTION 4: Battery Requirements (unique system-level fields only) ══ -->
<div class="div-label" style="margin-bottom:12px">④ Battery Requirements</div>
<div class="card" style="margin-bottom:20px">
  <div class="ch3 b">📋 Battery Requirements
    <span style="float:right;font-size:9px;font-weight:400;color:var(--m)">System-level specs — unique fields not covered above</span>
  </div>
  <div class="g3">

    <!-- Col 1: Electrical Specification -->
    <div>
      <div class="div-label">Electrical Specification</div>
      <div class="field"><label>Cell Chemistry Preference</label>
        <select id="req_chem"><option>LFP</option><option>NMC</option><option>LTO</option><option>LMFP</option><option>NCA</option><option>Na-Ion</option></select>
      </div>
      <div class="field"><label>Cells in Series Range</label><input type="text" id="req_s_range" value="96–128" placeholder="e.g. 96-128"></div>
      <div class="field"><label>Long Peak Discharge 10min (kW)</label><input type="number" id="req_ppeak10" value="65"></div>
    </div>

    <!-- Col 2: Thermal System & Environmental -->
    <div>
      <div class="div-label">Thermal System</div>
      <div class="field"><label>Heating Feature Required</label><select id="req_heat"><option>Yes</option><option>No</option></select></div>
      <div class="field"><label>Liquid Cooling Required</label><select id="req_liqcool"><option>Yes</option><option>No — air only</option></select></div>
      <div class="field"><label>Max Coolant Flow Rate (L/min)</label><input type="number" id="req_maxflow" value="10"></div>
      <div class="field"><label>Pressure Drop Limit (mbar)</label><input type="number" id="req_dp" value="200"></div>
      <div class="div-label">Environmental</div>
      <div class="field"><label>Max Operating Humidity (RH%)</label><input type="number" id="req_rh" value="90"></div>
      <div class="field"><label>Vibration Standard</label><input type="text" value="ISO 16750-3"></div>
    </div>

    <!-- Col 3: Safety, Durability & BMS -->
    <div>
      <div class="div-label">Safety (Passive)</div>
      <div class="field"><label>Insulation Resistance (MΩ)</label><input type="text" value="≥ 10 MΩ"></div>

<div class="sec" id="precharge">
<div class="sh"><h2>⚙️ Precharge Resistor Calculation</h2><p>Selects resistor based on capacitance, pack voltage, time, current limit, and leakage — outputs energy rating and contactor inrush check.</p></div>
<div class="ico-banner">🔗 Battery voltage from Cell tab</div>
<div class="g2">
<div class="card">
<div class="ch3">Precharge Inputs</div>
<div class="fbox">τ = t_pre / n  →  R = τ / C           (by time constant)
R = V_bat / I_max                       (by peak current limit)
R = (1−α)·V_bat / I_leak               (by leakage)
R_sel = max(R_by_time, R_by_Imax, R_by_leak)
Vc(t) = V_bat × (1 − e^(−t/τ))
I_main_inrush = (V_bat − Vc_final) / R_main_total</div>
<div class="field"><label>DC-link Capacitance (F) <span class="lsource">From inverter datasheet</span></label><input type="number" id="pc_C" value="0.002" step="0.0001" oninput="calcPrecharge()"><div class="hint">Total DC bus capacitance of connected load (inverter, DC-DC, motor drive). Typical: 0.5–5 mF.</div></div>
<div class="field"><label>Battery Voltage V_bat (V) <span class="lsource">← Cell tab</span></label><input type="number" id="pc_Vbat" value="400" step="1" oninput="calcPrecharge()"></div>
<div class="field"><label>Battery V_min Lower Limit (V)</label><input type="number" id="pc_Vlo" value="250" step="1" oninput="calcPrecharge()"></div>
<div class="field"><label>Desired Precharge Time (s)</label><input type="number" id="pc_t" value="1.5" step="0.1" oninput="calcPrecharge()"></div>
<div class="field"><label>Time Constants n</label><input type="number" id="pc_n" value="5" step="1" oninput="calcPrecharge()"><div class="hint">n=5 → 99.3% of V_bat. n=3 → 95%. IEC 60947 standard uses n=5.</div></div>
<div class="field"><label>Completion Threshold α (%)</label><input type="number" id="pc_alpha" value="0.98" step="0.01" oninput="calcPrecharge()"><div class="hint">Close main contactor when Vc ≥ α × V_bat. 0.95–0.99 typical.</div></div>
<div class="field"><label>Max Initial Precharge Current I_max (A)</label><input type="number" id="pc_Imax" value="8" step="0.5" oninput="calcPrecharge()"><div class="hint">Sets minimum R = V_bat/I_max. Protects precharge resistor from overcurrent. Set 0 to ignore this constraint.</div></div>
<div class="field"><label>Max Leakage Current I_leak (A)</label><input type="number" id="pc_Ileak" value="0.2" step="0.01" oninput="calcPrecharge()"><div class="hint">Maximum allowable leakage through precharge path (isolation monitoring concern).</div></div>
<div class="field"><label>Main Contactor Circuit Resistance R_main (Ω)</label><input type="number" id="pc_Rs" value="0.001" step="0.0001" oninput="calcPrecharge()"><div class="hint">Total series resistance when main contactor closes: contactor Rce + wiring resistance. Typical 1–5 mΩ. Used for inrush calculation at contactor close.</div></div>
<div class="field"><label>Main Contactor Current Rating (A)</label>
  <input type="number" id="pc_Icont" value="500" step="10" oninput="calcPrecharge()">
  <div class="hint">From contactor datasheet. e.g. Sensata AMETEK: 500A, Tyco EV200: 700A, TE Kilovac: 700A.</div>
</div>
<div class="field"><label>⚡ Max Allowed Inrush at Main Close (A) <span style="background:rgba(0,212,170,.15);color:#00d4aa;padding:1px 6px;border-radius:3px;font-size:9px">DESIGN TARGET</span></label>
  <input type="number" id="pc_inrush_limit" value="50" step="5" oninput="calcPrecharge()">
  <div class="hint">Engineering target for inrush current when main contactor closes. Typical: 10–50A. Rule of thumb: &lt;10% of contactor I_rated (e.g. 50A for 500A contactor). Lower = better for contactor life. Depends on capacitor charge level at close, bus capacitance, and cable resistance.</div>
</div>
<div class="field"><label>Contactor arc energy limit (J) — optional</label>
  <input type="number" id="pc_arc_limit" value="0.05" step="0.01" oninput="calcPrecharge()">
  <div class="hint">Max energy allowed at contactor close: E = ½CV²_delta. Keep below contact rating. Typical 0.01–0.1J. Set 0 to ignore.</div>
</div>
<div class="field"><label>Safety Margin on Energy Rating (×)</label><input type="number" id="pc_margin" value="1.5" step="0.1" oninput="calcPrecharge()"><div class="hint">Recommended ≥1.5× E_res for resistor pulse rating.</div></div>
</div>

<div class="g2">

  <div class="fbox">R = ρ × L / (W × T) × (1 + α×ΔT)
J = I / (W×T)   [A/mm²]   → must be ≤ J_limit
ΔT_rise = I² × R / (surface × h_conv)</div>

    <option value="Al_3003">Al 3003 (ρ=4.1e-8)</option>
    <option value="CCA">Cu-Clad Al (CCA) (ρ=2.7e-8)</option>

  <div class="field"><label>Thickness (mm)</label><input type="number" id="bb_T" value="3" step="0.5" oninput="calcBusbar()"></div>

<div class="card">

  <div class="card-body">
    <div class="sec-label">Electrical architecture</div>
    <div class="fgrid">
      <div class="fg"><div class="flabel"><span class="rdot"></span>Cell chemistry <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ req_chem + c_chem</span></div>

          <option value="">Select chemistry</option>
          <option value="LFP">LFP — Lithium Iron Phosphate</option>
          <option value="NMC">NMC — Nickel Manganese Cobalt</option>
          <option value="NCA">NCA — Nickel Cobalt Aluminium</option>

      </div>
      <div class="fg"><div class="flabel"><span class="rdot"></span>Voltage Architecture <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_varch</span></div>

      <div class="fg"><div class="flabel"><span class="rdot"></span>System V_max (Vdc) <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_vmax_sys + req_vmax</span></div><input type="number" id="dvp-vmax" placeholder="e.g. 500" oninput="syncField('dvp-vmax','t_vmax_sys');syncField('dvp-vmax','req_vmax')"></div>

      <div class="fg"><div class="flabel"><span class="rdot"></span>Min Usable Energy (kWh) <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_eu_min + req_eu</span></div><input type="number" id="dvp-energy" placeholder="e.g. 40" step="0.1" oninput="syncField('dvp-energy','t_eu_min');syncField('dvp-energy','req_eu')"></div>
      <div class="fg"><div class="flabel"><span class="rdot"></span>Min Installed Energy (kWh) <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_emin</span></div><input type="number" id="dvp-emin" placeholder="e.g. 43" step="0.1" oninput="syncField('dvp-emin','t_emin')"></div>

  </div>
</div>

      <div class="fg"><div class="flabel"><span class="rdot"></span>Min Operating Temp (°C) <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_top_lo</span></div><input type="number" id="dvp-top_lo" value="-20" oninput="syncField('dvp-top_lo','t_top_lo')"></div>
      <div class="fg"><div class="flabel"><span class="rdot"></span>Max Operating Temp (°C) <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_top_hi</span></div><input type="number" id="dvp-top_hi" value="45" oninput="syncField('dvp-top_hi','t_top_hi')"></div>

      <div class="fg" id="fg-em"><div class="flabel"><span class="rdot"></span>Project owner email</div><input type="email" id="ownerEmail" placeholder="e.g. viji@company.com"><div class="errmsg">Valid email required</div></div>
      <div class="fg"><div class="flabel">Functional safety target <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_fusa</span></div>
        <select id="funcSafety" onchange="syncField('funcSafety','t_fusa')">
          <option value="">Not specified</option>
          <option value="pld">PLd (ISO 13849) — off-highway</option>
          <option value="ple">PLe (ISO 13849) — off-highway</option>
          <option value="asilb">ASIL B (ISO 26262)</option>
          <option value="asilc">ASIL C (ISO 26262)</option>
          <option value="asild">ASIL D (ISO 26262)</option>
          <option value="sil2">SIL 2 (IEC 62061)</option>
        </select>
      </div>
      <div class="fg"><div class="flabel">Cost Target (€/kWh) <span class="otag" style="font-size:9px;background:var(--teal-bg);color:var(--teal);border-color:var(--teal)">↔ t_cost</span></div><input type="number" id="dvp-cost" placeholder="e.g. 130" oninput="syncField('dvp-cost','t_cost')"></div>
      <div class="fg full"><div class="flabel">Additional notes <span class="otag">optional</span></div><textarea id="notes" placeholder="Special test conditions, regulatory deadlines, customer requirements..." style="min-height:70px"></textarea></div>
    </div>
  </div>
</div>
<div class="btn-row"><button class="btn btn-s" onclick="switchIntakeTab('scope',document.getElementById('itab-scope'))">← Back</button><button class="btn btn-p" onclick="buildReviewAndGo()">Review &amp; Submit →</button></div>
</div>

<!-- ── TAB E: REVIEW & SUBMIT ── -->
<div class="itab-panel" id="ipanel-review">
<div class="card">
  <div class="card-head"><span style="color:var(--teal)">✓</span><h3>Project summary — review before submitting to n8n</h3></div>
  <div class="card-body">
    <div id="reviewGrid" class="summ-grid" style="grid-template-columns:1fr 1fr 1fr;gap:10px 24px;font-size:12px;margin-bottom:20px"></div>
    <div style="background:var(--teal-bg);border:1px solid var(--teal);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--teal);margin-bottom:16px">
      ✓ All values above are already live in the Battery System Engineering tabs. Submitting sends this record to n8n for DVP generation.
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-p" style="width:auto;flex:1" onclick="doSubmit()">Submit — Start DVP Automation ⚡</button>
      <button class="btn btn-s" style="width:auto" onclick="switchTopTab('engineering',document.getElementById('ttab-engineering'))">Open Battery Engineering →</button>
    </div>
  </div>
</div>
</div>

</div><!-- end dvp-wrap-inner -->

<!-- OVERLAY -->
<div class="overlay" id="ov">
  <div class="ov-card">
    <div id="ov-loading"><div class="spinner"></div><div style="font-size:15px;font-weight:600;margin-bottom:8px">Triggering automation...</div><div style="font-size:13px;color:var(--text2)">Sending to n8n workflow engine</div></div>
    <div id="ov-ok" style="display:none">
      <div class="ok-icon"><svg width="22" height="22" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div style="font-size:17px;font-weight:600;color:var(--teal);margin-bottom:8px">Automation started!</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px">WF-1 is running. DVP generation, gap analysis and Gantt will be ready shortly.</div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:18px" id="ov-ref"></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-p" style="width:auto;margin:0" onclick="switchTopTab('dashboard',document.getElementById('ttab-dashboard'))">View Dashboard →</button>
        <button class="btn btn-s" style="width:auto;margin:0" onclick="document.getElementById('ov').style.display='none'">Close</button>
      </div>
    </div>
    <div id="ov-err" style="display:none">
      <div style="font-size:15px;font-weight:600;color:var(--red);margin-bottom:8px">Submission failed</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:18px" id="ov-errmsg">Check n8n webhook URL in DVP_CONFIG</div>
      <div class="field" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
        <label style="color:var(--teal);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em">SOC-Based Power Derating</label>
      </div>
      <div class="field"><label>SoC Low threshold (%)</label>
        <input type="number" id="pm_soc_lo" value="20" step="5" min="0" max="50" oninput="drawPowerMap()">
        <div class="hint">Below this SoC, power is derated. Typical: 10–20%</div>
      </div>
      <div class="field"><label>SoC High threshold (%)</label>
        <input type="number" id="pm_soc_hi" value="80" step="5" min="50" max="100" oninput="drawPowerMap()">
        <div class="hint">Above this SoC, charge power derated. Typical: 80–90%</div>
      </div>
      <div class="field"><label>Low-SoC power derating factor</label>
        <input type="number" id="pm_soc_lo_factor" value="0.7" step="0.05" min="0.1" max="1.0" oninput="drawPowerMap()">
        <div class="hint">e.g. 0.7 = 70% of peak power at SoC_low. Typical 0.5–0.8</div>
      </div>
      <div class="field"><label>High-SoC charge derating factor</label>
        <input type="number" id="pm_soc_hi_factor" value="0.6" step="0.05" min="0.1" max="1.0" oninput="drawPowerMap()">
        <div class="hint">e.g. 0.6 = 60% charge power at high SoC (taper). Typical 0.4–0.7</div>
      </div>
      <div id="pm_soc_status" style="margin-top:8px;font-size:10px;color:var(--text2)"></div>
      <button class="btn btn-s" style="width:auto;margin:0 auto" onclick="document.getElementById('ov').style.display='none'">Close</button>
    </div>
  </div>
</div>

</div><!-- end dvp-wrap -->
</div><!-- end panel-intake -->

<div class="main-panel" id="panel-approvals">
<div class="dvp-wrap">
<div class="approval-wrap">
  <h1 style="font-size:26px;font-weight:600;letter-spacing:-0.03em;margin-bottom:8px;">Approval centre</h1>
  <p class="dvp-hero" style="padding:0;font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.6;">Review and approve the standards classification list before RAG ingestion begins. This is the only hard gate in the automation — nothing proceeds until you submit here.</p>

  <div class="info-box">
    Before approving: open <strong>02_Standards/01_Classified/</strong> in Google Drive and review the filtered off-highway standards list. The automation has classified all 150+ PDFs and moved off-highway relevant files there.
  </div>

  <div class="card" style="margin-bottom:24px">
    <div class="card-head"><h3>Review checklist</h3></div>
    <div class="card-body">
      <div class="step-item-ap"><div class="step-n">1</div><div class="step-content"><div class="step-title">Open Google Drive → 02_Standards/01_Classified/</div><div class="step-desc">Count the files — should be a subset of your 150+ total standards</div></div></div>
      <div class="step-item-ap"><div class="step-n">2</div><div class="step-content"><div class="step-title">Verify standard numbers and version years are correct</div><div class="step-desc">Each filename should include the standard number and year. Check against Standards_index.xlsx in 02_Standards/</div></div></div>
      <div class="step-item-ap"><div class="step-n">3</div><div class="step-content"><div class="step-title">Check nothing automotive/marine/general was incorrectly included</div><div class="step-desc">UNECE R100 (automotive), CISPR 25 (automotive EMC) should NOT be in the list for off-highway projects</div></div></div>
      <div class="step-item-ap"><div class="step-n">4</div><div class="step-content"><div class="step-title">Submit your decision below</div><div class="step-desc">APPROVE to start RAG ingestion immediately · REJECT to request corrections</div></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <span style="font-size:18px">📋</span>
      <h3>Standards list approval</h3>
      <div class="gate-badge gate-hard">HARD GATE</div>
    </div>
    <div class="card-body">
      <div class="fg" style="margin-bottom:16px">
        <div class="flabel"><span class="rdot" style="background:var(--red)"></span>Decision</div>
        <select id="ap-decision">
          <option value="">Select your decision</option>
          <option value="APPROVE">APPROVE — proceed to RAG ingestion</option>
          <option value="REJECT">REJECT — corrections needed</option>
        </select>
      </div>
      <div class="fg" style="margin-bottom:16px">
        <div class="flabel">Standards to ADD (filenames, one per line)</div>
        <textarea id="ap-toAdd" placeholder="Leave blank if none&#10;e.g. ISO_25119-1_2018.pdf"></textarea>
        <div class="hint">Only needed if classifier missed a relevant off-highway standard</div>
      </div>
      <div class="fg" style="margin-bottom:16px">
        <div class="flabel">Standards to REMOVE (filenames, one per line)</div>
        <textarea id="ap-toRemove" placeholder="Leave blank if none&#10;e.g. CISPR_25_2021.pdf"></textarea>
        <div class="hint">Only needed if classifier incorrectly included a non-applicable standard</div>
      </div>
      <div class="fg" style="margin-bottom:16px">
        <div class="flabel">Notes for automation engineer</div>
        <textarea id="ap-notes" placeholder="Any additional instructions or observations (optional)" style="min-height:60px"></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px">
        <button class="btn-reject" onclick="submitApproval('REJECT')">Submit Rejection</button>
        <button class="btn-approve" onclick="submitApproval('APPROVE')">✓ Approve — Start RAG</button>
      </div>
    </div>
  </div>
</div>
</div>
</div><!-- end panel-approvals -->

<div class="main-panel" id="panel-dashboard">
<div class="dash-header">
  <div class="dash-title">
    <h1>Test status dashboard</h1>
    <p><span class="live-dot"></span>Live data from Google Sheets — auto-refreshes every 60 seconds</p>
  </div>
  <div class="dash-controls">
    <span class="last-refresh" id="lastRefresh">Loading...</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <button class="btn btn-p" style="padding:7px 14px;font-size:12px;width:auto;margin:0" onclick="switchTopTab('intake',document.getElementById('ttab-intake'))">+ New Project</button>
  </div>
</div>

<div class="dash-main">
  <div class="kpi-row" id="kpiRow">
    <div class="kpi"><div class="kpi-val" id="k-total">—</div><div class="kpi-label">Total tests</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--teal)" id="k-pass">—</div><div class="kpi-label">Passed</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--red)" id="k-fail">—</div><div class="kpi-label">Failed</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--amber)" id="k-running">—</div><div class="kpi-label">In progress</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--blue2)" id="k-pct">—</div><div class="kpi-label">Pass rate</div><div class="kpi-sub" id="k-pending">— pending</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('cell',this)">Cell level</button>
    <button class="filter-btn" onclick="setFilter('module',this)">Module level</button>
    <button class="filter-btn" onclick="setFilter('pack',this)">Pack level</button>
    <button class="filter-btn" onclick="setFilter('system',this)">System level</button>
    <button class="filter-btn" onclick="setFilter('fail',this)">Failures only</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
  </div>
  <div class="section-title">Test items status</div>
  <div id="statusGrid" class="status-grid">
    <div class="loading"><div class="loading-spinner"></div>Loading test data from Google Sheets...</div>
  </div>
  <div class="section-title">Gantt chart — planned timeline</div>
  <div class="gantt-wrap">
    <div class="gantt-head">Test execution timeline</div>
    <div class="gantt-body" id="ganttBody"><div class="loading"><div class="loading-spinner"></div>Loading Gantt data...</div></div>
  </div>
  <div class="section-title">Latest results</div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden">
    <table class="results-table" id="resultsTable">
      <thead><tr><th>Test ID</th><th>Category</th><th>Level</th><th>Result</th><th>Standard</th><th>Engineer</th><th>Date</th><th>Confidence</th></tr></thead>
      <tbody id="resultsBody"><tr><td colspan="8"><div class="loading"><div class="loading-spinner"></div></div></td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('modalBg').style.display='none'">✕ Close</button>
    <h3 id="modalTitle">Test Detail</h3>
    <div id="modalBody"></div>
  </div>
</div>
</div><!-- end panel-dashboard -->
